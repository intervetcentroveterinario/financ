// =====================================================
// CONFIGURAÇÃO DINÂMICA — salva no localStorage
// =====================================================
const STORAGE_KEY = 'intervet_finance_rtdb_config';

function getSavedConfig() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch { return null; }
}

function saveConfig(databaseURL, apiKey) {
  const projectId = databaseURL.replace('https://','').replace(/-default-rtdb\.firebaseio\.com.*/,'');
  const config = { apiKey, authDomain: `${projectId}.firebaseapp.com`, databaseURL, projectId, storageBucket: `${projectId}.firebasestorage.app`, appId: 'placeholder' };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
  return config;
}

const savedConfig = getSavedConfig();
if (!savedConfig) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

window.conectarFirebase = function() {
  const dbURL = document.getElementById('setup-dburl').value.trim();
  const apiKey = document.getElementById('setup-apikey').value.trim();
  if (!dbURL) return alert('Cole a URL do banco de dados!');
  if (!apiKey) return alert('Digite a API Key!');
  saveConfig(dbURL, apiKey);
  location.reload();
};

window.resetConfig = function() {
  if (confirm('Desconectar e trocar de projeto?')) { localStorage.removeItem(STORAGE_KEY); location.reload(); }
};

if (!savedConfig) { throw new Error('Aguardando configuração'); }

const app = initializeApp(savedConfig);
const db = getDatabase(app);
// =====================================================

const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const fmt = v => (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0});
const pct = v => ((v||0)*100).toFixed(1)+'%';
const init12 = () => Array(12).fill(0);

// =====================================================
// FIREBASE CRUD
// =====================================================
// =====================================================
// REALTIME DATABASE CRUD
// =====================================================
function objToArr(obj) { return obj ? Object.values(obj) : []; }

async function loadAll(year) {
  const snap = await get(ref(db));
  const data = snap.val() || {};
  const cats = objToArr(data.categories).sort((a,b)=>(a.order||0)-(b.order||0));
  const entries = objToArr(data.entries).filter(e=>e.year===year);
  const accs = objToArr(data.accounts).sort((a,b)=>(a.order||0)-(b.order||0));
  const bals = objToArr(data.balances_monthly).filter(b=>b.year===year);
  const invs = objToArr(data.investments).sort((a,b)=>(a.order||0)-(b.order||0));
  const ibals = objToArr(data.investment_balances).filter(b=>b.year===year);
  return {
    categories: cats,
    revEntries: entries.filter(e=>e.type==='revenue'),
    expEntries: entries.filter(e=>e.type==='expense'),
    accounts: accs,
    balances: bals,
    investments: invs,
    invBalances: ibals,
  };
}

async function saveCategory(d) {
  const id = d.id || `cat_${Date.now()}_${Math.random().toString(36).substr(2,5)}`;
  await set(ref(db,`categories/${id}`), {...d, id});
}
async function deleteCategory(id) { await remove(ref(db,`categories/${id}`)); }

async function saveEntry(catId, year, month, amount, type) {
  const id = `${catId}_${year}_${month}`;
  await set(ref(db,`entries/${id}`), {categoryId:catId,year,month,amount:Number(amount)||0,type});
}

async function saveAccount(d) {
  const id = d.id || `acc_${Date.now()}`;
  await set(ref(db,`accounts/${id}`), {...d, id});
}
async function deleteAccount(id) { await remove(ref(db,`accounts/${id}`)); }

async function saveMonthlyBalance(accId, year, month, balance) {
  const id = `${accId}_${year}_${month}`;
  await set(ref(db,`balances_monthly/${id}`), {accountId:accId,year,month,balance:Number(balance)||0});
}

async function saveInvestment(d) {
  const id = d.id || `inv_${Date.now()}`;
  await set(ref(db,`investments/${id}`), {...d, id});
}
async function deleteInvestment(id) { await remove(ref(db,`investments/${id}`)); }

async function saveInvBalance(invId, year, month, balance) {
  const id = `${invId}_${year}_${month}`;
  await set(ref(db,`investment_balances/${id}`), {investmentId:invId,year,month,balance:Number(balance)||0});
}

// =====================================================
// CÁLCULOS (DRE, EBITDA, etc)
// =====================================================
function calculate(data) {
  const c = {revByMonth:init12(),revBySector:{},revByCat:{},expByGroup:{},expByCat:{},expByMonth:init12()};
  const revCats = data.categories.filter(x=>x.type==='revenue');
  const expCats = data.categories.filter(x=>x.type==='expense');

  revCats.forEach(cat => {
    const s = cat.sector||'Outros';
    if(!c.revBySector[s]) c.revBySector[s]=init12();
    c.revByCat[cat.id]=init12();
    data.revEntries.filter(e=>e.categoryId===cat.id).forEach(e=>{
      c.revByCat[cat.id][e.month]=e.amount;
      c.revByMonth[e.month]+=e.amount;
      c.revBySector[s][e.month]+=e.amount;
    });
  });
  c.revTotal=c.revByMonth.reduce((a,b)=>a+b,0);

  expCats.forEach(cat => {
    const g=cat.group||'Outros';
    if(!c.expByGroup[g]) c.expByGroup[g]=init12();
    c.expByCat[cat.id]=init12();
    data.expEntries.filter(e=>e.categoryId===cat.id).forEach(e=>{
      c.expByCat[cat.id][e.month]=e.amount;
      c.expByMonth[e.month]+=e.amount;
      c.expByGroup[g][e.month]+=e.amount;
    });
  });
  c.expTotal=c.expByMonth.reduce((a,b)=>a+b,0);

  const cmv=c.expByGroup['CMV / CSP']||init12();
  c.cmvByMonth=cmv; c.cmvTotal=cmv.reduce((a,b)=>a+b,0);
  c.lucroBruto=c.revByMonth.map((v,i)=>v-cmv[i]);
  c.lucroBrutoTotal=c.revTotal-c.cmvTotal;

  const pes=c.expByGroup['Pessoal']||init12();
  const sga=c.expByGroup['SG&A']||init12();
  c.sgaTotal=sga.map((v,i)=>v+pes[i]);
  c.sgaTotalSum=c.sgaTotal.reduce((a,b)=>a+b,0);
  c.ebitda=c.lucroBruto.map((v,i)=>v-c.sgaTotal[i]);
  c.ebitdaTotal=c.lucroBrutoTotal-c.sgaTotalSum;

  const dep=c.expByGroup['D&A']||init12();
  c.ebit=c.ebitda.map((v,i)=>v-dep[i]);
  c.ebitTotal=c.ebit.reduce((a,b)=>a+b,0);
  const imp=c.expByGroup['Impostos']||init12();
  const fin=c.expByGroup['Financeiras']||init12();
  c.lucroLiq=c.ebit.map((v,i)=>v-imp[i]-fin[i]);
  c.lucroLiqTotal=c.lucroLiq.reduce((a,b)=>a+b,0);

  c.mBruta=c.revTotal>0?c.lucroBrutoTotal/c.revTotal:0;
  c.mEbitda=c.revTotal>0?c.ebitdaTotal/c.revTotal:0;
  c.mLiq=c.revTotal>0?c.lucroLiqTotal/c.revTotal:0;

  c.saldoContas=init12();
  data.accounts.forEach(a=>data.balances.filter(b=>b.accountId===a.id).forEach(b=>c.saldoContas[b.month]+=b.balance));
  c.saldoInv=init12();
  data.investments.forEach(inv=>data.invBalances.filter(b=>b.investmentId===inv.id).forEach(b=>c.saldoInv[b.month]+=b.balance));
  c.patrimonio=c.saldoContas.map((v,i)=>v+c.saldoInv[i]);

  return c;
}

// =====================================================
// PDF EXPORT
// =====================================================
function exportPDF(year, month, calc) {
  const{jsPDF}=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');
  const w=pdf.internal.pageSize.getWidth();
  const G=[27,94,32];
  pdf.setFillColor(...G);pdf.rect(0,0,w,24,'F');
  pdf.setTextColor(255,255,255);pdf.setFontSize(15);pdf.setFont('helvetica','bold');
  pdf.text('Intervet Centro Veterinário',14,10);
  pdf.setFontSize(10);pdf.setFont('helvetica','normal');
  pdf.text(`Relatório — ${MONTHS[month]} / ${year} — Regime de caixa`,14,17);
  pdf.text(new Date().toLocaleDateString('pt-BR'),14,22);

  const mi=month;
  const rows=[
    ['Receita bruta',fmt(calc.revByMonth[mi]),'100%'],
    ['(-) CMV/CSP',fmt(-calc.cmvByMonth[mi]),pct(calc.revByMonth[mi]>0?-calc.cmvByMonth[mi]/calc.revByMonth[mi]:0)],
    ['= Lucro bruto',fmt(calc.lucroBruto[mi]),pct(calc.revByMonth[mi]>0?calc.lucroBruto[mi]/calc.revByMonth[mi]:0)],
    ['(-) Pessoal + SG&A',fmt(-calc.sgaTotal[mi]),''],
    ['= EBITDA',fmt(calc.ebitda[mi]),pct(calc.revByMonth[mi]>0?calc.ebitda[mi]/calc.revByMonth[mi]:0)],
    ['(-) D&A',fmt(-(calc.expByGroup['D&A']?.[mi]||0)),''],
    ['= EBIT',fmt(calc.ebit[mi]),''],
    ['(-) Impostos + Financeiras',fmt(-((calc.expByGroup['Impostos']?.[mi]||0)+(calc.expByGroup['Financeiras']?.[mi]||0))),''],
    ['= Lucro líquido',fmt(calc.lucroLiq[mi]),pct(calc.revByMonth[mi]>0?calc.lucroLiq[mi]/calc.revByMonth[mi]:0)],
  ];
  pdf.autoTable({startY:30,head:[['Conta','Valor','% Receita']],body:rows,theme:'striped',
    headStyles:{fillColor:G,fontSize:9},bodyStyles:{fontSize:9},
    columnStyles:{0:{cellWidth:75},1:{halign:'right'},2:{halign:'right'}},margin:{left:14,right:14},
    didParseCell:d=>{if(d.section==='body'&&rows[d.row.index]?.[0]?.startsWith('=')){d.cell.styles.fontStyle='bold';d.cell.styles.fillColor=[232,245,233];}}
  });

  let y=pdf.lastAutoTable.finalY+8;
  const sectors=Object.entries(calc.revBySector).map(([s,v])=>[s,fmt(v[mi]),pct(calc.revByMonth[mi]>0?v[mi]/calc.revByMonth[mi]:0)]);
  pdf.setFontSize(11);pdf.setFont('helvetica','bold');pdf.setTextColor(0,0,0);
  pdf.text('Receita por setor',14,y);y+=4;
  pdf.autoTable({startY:y,head:[['Setor','Valor','%']],body:sectors,theme:'striped',headStyles:{fillColor:G,fontSize:9},bodyStyles:{fontSize:9},columnStyles:{1:{halign:'right'},2:{halign:'right'}},margin:{left:14,right:14}});
  y=pdf.lastAutoTable.finalY+8;

  pdf.text('Patrimônio',14,y);y+=4;
  pdf.autoTable({startY:y,body:[['Contas',fmt(calc.saldoContas[mi])],['Investimentos',fmt(calc.saldoInv[mi])],['Total',fmt(calc.patrimonio[mi])]],theme:'grid',bodyStyles:{fontSize:10},columnStyles:{1:{halign:'right',fontStyle:'bold'}},margin:{left:14,right:14},
    didParseCell:d=>{if(d.row.index===2){d.cell.styles.fillColor=[232,245,233];d.cell.styles.fontStyle='bold';}}});
  y=pdf.lastAutoTable.finalY+12;
  if(y>255){pdf.addPage();y=15;}
  pdf.setFontSize(9);pdf.setTextColor(100,100,100);
  pdf.text('Obs: _____________________________________________________________',14,y);y+=12;
  pdf.text('Data: ____/____/______',14,y);pdf.text('Assinatura: ____________________________',120,y);
  pdf.setFontSize(8);pdf.text('Intervet — Confidencial',14,290);
  pdf.save(`Intervet_${MONTHS[month]}_${year}.pdf`);
}

// =====================================================
// APP STATE & RENDER
// =====================================================
let STATE = { year:new Date().getFullYear(), tab:'dashboard', data:null, calc:null, viewMode:'accumulated', viewMonth:new Date().getMonth(), expanded:{} };

async function reload() {
  document.getElementById('loading').style.display='flex';
  STATE.data = await loadAll(STATE.year);
  STATE.calc = calculate(STATE.data);
  render();
  document.getElementById('loading').style.display='none';
}

function setTab(t) { STATE.tab=t; render(); }
function setYear(y) { STATE.year=+y; reload(); }
function toggleExp(k) { STATE.expanded[k]=!STATE.expanded[k]; render(); }

function render() {
  const app=document.getElementById('app-content');
  const d=STATE.data, c=STATE.calc;
  if(!d||!c) return;

  document.querySelectorAll('.nav-btn').forEach(el=>{
    el.classList.toggle('active', el.dataset.tab===STATE.tab);
  });
  document.getElementById('year-select').value=STATE.year;

  const vm=STATE.viewMode, mi=STATE.viewMonth;
  const V=(arr,total)=>vm==='monthly'?arr[mi]:total!==undefined?total:arr.reduce((a,b)=>a+b,0);

  if(STATE.tab==='dashboard') app.innerHTML=renderDashboard(d,c,V);
  else if(STATE.tab==='dre') app.innerHTML=renderDRE(d,c,V);
  else if(STATE.tab==='revenue') app.innerHTML=renderEntries(d,'revenue');
  else if(STATE.tab==='expenses') app.innerHTML=renderEntries(d,'expense');
  else if(STATE.tab==='accounts') app.innerHTML=renderAccounts(d);
  else if(STATE.tab==='investments') app.innerHTML=renderInvestments(d);
  else if(STATE.tab==='reports') app.innerHTML=renderReports();

  attachEvents();
}

// =====================================================
// RENDER FUNCTIONS
// =====================================================
function renderDashboard(d,c,V) {
  const rev=V(c.revByMonth,c.revTotal);
  const ebitda=V(c.ebitda,c.ebitdaTotal);
  const ll=V(c.lucroLiq,c.lucroLiqTotal);
  const lastP=c.patrimonio.reduce((l,v,i)=>v>0?i:l,0);
  const pat=STATE.viewMode==='monthly'?c.patrimonio[STATE.viewMonth]:c.patrimonio[lastP];
  const mE=rev>0?ebitda/rev:0;
  const mL=rev>0?ll/rev:0;

  let html=`<h1 class="page-title">Dashboard</h1><p class="page-sub">${STATE.viewMode==='monthly'?MONTHS[STATE.viewMonth]+' / ':'Acumulado — '}${STATE.year}</p>`;
  html+=`<div class="kpi-grid">`;
  html+=kpi('Receita',fmt(rev),'','green');
  html+=kpi('EBITDA',fmt(ebitda),`Margem: ${pct(mE)}`,ebitda>=0?'green':'red');
  html+=kpi('Lucro líquido',fmt(ll),`Margem: ${pct(mL)}`,ll>=0?'green':'red');
  html+=kpi('Patrimônio',fmt(pat),'contas + investimentos','blue');
  html+=`</div>`;

  html+=`<div class="sector-grid">`;
  Object.entries(c.revBySector).forEach(([s,vals])=>{
    const t=V(vals); const share=rev>0?t/rev:0;
    const cl=s==='Clínica'?'#2e7d32':s==='Loja'?'#1565c0':'#6a1b9a';
    html+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="badge" style="background:${cl}15;color:${cl}">${s}</span><span class="sub">${pct(share)}</span></div><div class="val">${fmt(t)}</div>`;
    if(STATE.viewMode==='accumulated'){
      html+=`<div class="minibar">${vals.map(v=>{const mx=Math.max(...vals,1);return`<div style="flex:1;border-radius:2px 2px 0 0;background:${cl};height:${Math.max((v/mx)*100,3)}%;opacity:${v>0?.6:.1}"></div>`;}).join('')}</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;

  html+=`<div class="card" style="margin-top:16px"><h3 class="card-title">Resultado mensal</h3><div class="table-scroll"><table><thead><tr><th>Indicador</th>${MONTHS.map(m=>`<th class="r">${m}</th>`).join('')}<th class="r" style="font-weight:700">Total</th></tr></thead><tbody>`;
  [{l:'Receita',v:c.revByMonth,t:c.revTotal},{l:'Lucro bruto',v:c.lucroBruto,t:c.lucroBrutoTotal},{l:'EBITDA',v:c.ebitda,t:c.ebitdaTotal},{l:'Lucro líq.',v:c.lucroLiq,t:c.lucroLiqTotal}].forEach(r=>{
    html+=`<tr><td class="bold">${r.l}</td>${r.v.map(v=>`<td class="r mono ${v<0?'red':''}">${fmt(v)}</td>`).join('')}<td class="r mono bold">${fmt(r.t)}</td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  return html;
}

function renderDRE(d,c,V) {
  const rev=V(c.revByMonth,c.revTotal);
  const revCats=d.categories.filter(x=>x.type==='revenue');
  const expCats=d.categories.filter(x=>x.type==='expense');

  function dreRow(label,value,opts={}) {
    const{bold,big,color,indent,ek}=opts;
    const cl=`${bold?'bold ':''} ${big?'big ':''}${indent?'indent ':''}`;
    const arrow=ek?(STATE.expanded[ek]?'▾':'▸')+' ':'';
    const pctVal=typeof value==='number'&&rev>0?pct(value/rev):'';
    const valStr=typeof value==='number'?fmt(value):value;
    return `<tr class="dre-row ${ek?'clickable':''}" ${ek?`onclick="toggleExp('${ek}')"`:''}><td class="${cl}" style="color:${color||'inherit'}">${arrow}${label}</td><td class="r mono ${cl}" style="color:${color||'inherit'}">${valStr}</td><td class="r sub">${pctVal}</td></tr>`;
  }

  let html=`<h1 class="page-title">DRE</h1><p class="page-sub">${STATE.viewMode==='monthly'?MONTHS[STATE.viewMonth]:'Acumulado'} — Clique para expandir</p>`;
  html+=`<div class="card" style="padding:0;overflow:hidden;max-width:700px"><table class="dre-table"><thead><tr><th style="width:55%">Conta</th><th class="r">Valor</th><th class="r">% Receita</th></tr></thead><tbody>`;

  html+=dreRow('Receita bruta',rev,{bold:1,big:1,color:'#2e7d32',ek:'rev'});
  if(STATE.expanded.rev){
    Object.entries(c.revBySector).forEach(([s,v])=>html+=dreRow(s,V(v),{indent:1}));
    revCats.forEach(cat=>{const t=V(c.revByCat[cat.id]||init12());if(t>0)html+=dreRow('  '+cat.name,t,{indent:1});});
  }
  html+=dreRow('(-) CMV / CSP',-V(c.cmvByMonth,c.cmvTotal),{color:'#c62828',ek:'cmv'});
  if(STATE.expanded.cmv) expCats.filter(x=>x.group==='CMV / CSP').forEach(cat=>{const t=V(c.expByCat[cat.id]||init12());if(t>0)html+=dreRow(cat.name,-t,{indent:1});});

  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('Lucro bruto',V(c.lucroBruto,c.lucroBrutoTotal),{bold:1,big:1,color:V(c.lucroBruto,c.lucroBrutoTotal)>=0?'#2e7d32':'#c62828'});

  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('(-) Pessoal',-V(c.expByGroup['Pessoal']||init12()),{ek:'pes'});
  if(STATE.expanded.pes) expCats.filter(x=>x.group==='Pessoal').forEach(cat=>{const t=V(c.expByCat[cat.id]||init12());if(t>0)html+=dreRow(cat.name,-t,{indent:1});});
  html+=dreRow('(-) SG&A',-V(c.expByGroup['SG&A']||init12()),{ek:'sga'});
  if(STATE.expanded.sga) expCats.filter(x=>x.group==='SG&A').forEach(cat=>{const t=V(c.expByCat[cat.id]||init12());if(t>0)html+=dreRow(cat.name,-t,{indent:1});});

  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  const ebitdaVal=V(c.ebitda,c.ebitdaTotal);
  html+=dreRow('EBITDA',ebitdaVal,{bold:1,big:1,color:ebitdaVal>=0?'#2e7d32':'#c62828'});
  html+=dreRow('Margem EBITDA',pct(rev>0?ebitdaVal/rev:0));

  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('(-) D&A',-V(c.expByGroup['D&A']||init12()));
  html+=dreRow('EBIT',V(c.ebit,c.ebitTotal),{bold:1,color:V(c.ebit,c.ebitTotal)>=0?'#2e7d32':'#c62828'});

  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('(-) Impostos',-V(c.expByGroup['Impostos']||init12()),{ek:'imp'});
  if(STATE.expanded.imp) expCats.filter(x=>x.group==='Impostos').forEach(cat=>{const t=V(c.expByCat[cat.id]||init12());if(t>0)html+=dreRow(cat.name,-t,{indent:1});});
  html+=dreRow('(-) Financeiras',-V(c.expByGroup['Financeiras']||init12()),{ek:'fin'});
  if(STATE.expanded.fin) expCats.filter(x=>x.group==='Financeiras').forEach(cat=>{const t=V(c.expByCat[cat.id]||init12());if(t>0)html+=dreRow(cat.name,-t,{indent:1});});

  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  const llVal=V(c.lucroLiq,c.lucroLiqTotal);
  html+=dreRow('Lucro líquido',llVal,{bold:1,big:1,color:llVal>=0?'#2e7d32':'#c62828'});
  html+=dreRow('Margem líquida',pct(rev>0?llVal/rev:0));

  html+=`</tbody></table></div>`;

  html+=`<div class="kpi-grid" style="margin-top:16px;max-width:700px">`;
  html+=kpi('Margem bruta',pct(rev>0?V(c.lucroBruto,c.lucroBrutoTotal)/rev:0),'',V(c.lucroBruto,c.lucroBrutoTotal)/rev>.4?'green':'amber');
  html+=kpi('Margem EBITDA',pct(rev>0?ebitdaVal/rev:0),'',ebitdaVal/rev>.15?'green':'amber');
  html+=kpi('Margem líquida',pct(rev>0?llVal/rev:0),'',llVal/rev>.08?'green':'red');
  html+=`</div>`;
  return html;
}

function renderEntries(d,type) {
  const isRev=type==='revenue';
  const cats=d.categories.filter(x=>x.type===type);
  const entries=isRev?d.revEntries:d.expEntries;
  const gKey=isRev?'sector':'group';
  const groups={};
  cats.forEach(c=>{const k=c[gKey]||'Outros';if(!groups[k])groups[k]=[];groups[k].push(c);});
  const groupOptions=isRev?['Clínica','Loja','Banho e Tosa']:['CMV / CSP','Pessoal','SG&A','Impostos','Financeiras','D&A'];

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h1 class="page-title">${isRev?'Receitas':'Despesas'}</h1><p class="page-sub">Regime de caixa — ${STATE.year}</p></div>`;
  html+=`<button class="btn green" onclick="showCatForm('${type}')">+ Nova categoria</button></div>`;
  html+=`<div id="cat-form-${type}" style="display:none" class="card" style="margin-bottom:16px"><div class="form-row"><input id="cf-name-${type}" class="input" placeholder="Nome da categoria"><select id="cf-group-${type}" class="input">${groupOptions.map(g=>`<option>${g}</option>`).join('')}</select><input id="cf-order-${type}" type="number" class="input" placeholder="Ordem" value="50" style="width:80px"><button class="btn green" onclick="saveCatForm('${type}')">Salvar</button><button class="btn" onclick="hideCatForm('${type}')">Cancelar</button></div></div>`;

  Object.entries(groups).forEach(([grp,gcats])=>{
    html+=`<div class="card" style="margin-bottom:12px"><div class="badge" style="margin-bottom:10px;background:${isRev?'#e8f5e9':'#f5f5f5'};color:${isRev?'#2e7d32':'#555'}">${grp}</div>`;
    html+=`<div class="table-scroll"><table><thead><tr><th style="min-width:180px">Categoria</th>${MONTHS.map(m=>`<th class="r" style="min-width:85px">${m}</th>`).join('')}<th class="r">Total</th><th style="width:60px"></th></tr></thead><tbody>`;
    gcats.forEach(cat=>{
      const vals=MONTHS.map((_,mi)=>{const e=entries.find(x=>x.categoryId===cat.id&&x.month===mi);return e?.amount||0;});
      const total=vals.reduce((a,b)=>a+b,0);
      html+=`<tr><td>${cat.name}</td>${vals.map((v,mi)=>`<td><input type="number" class="input-num" value="${v||''}" placeholder="0" data-cat="${cat.id}" data-month="${mi}" data-type="${type}"></td>`).join('')}<td class="r mono bold">${fmt(total)}</td><td><button class="btn-sm red" onclick="deleteCat('${cat.id}')">✕</button></td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
  });
  return html;
}

function renderAccounts(d) {
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h1 class="page-title">Contas bancárias</h1><p class="page-sub">Saldo final no fim de cada mês — ${STATE.year}</p></div>`;
  html+=`<button class="btn green" onclick="showAccForm()">+ Nova conta</button></div>`;
  html+=`<div id="acc-form" style="display:none" class="card" style="margin-bottom:16px"><div class="form-row"><input id="af-name" class="input" placeholder="Nome da conta"><input id="af-bank" class="input" placeholder="Banco"><button class="btn green" onclick="saveAccForm()">Salvar</button><button class="btn" onclick="document.getElementById('acc-form').style.display='none'">Cancelar</button></div></div>`;

  html+=`<div class="card"><div class="table-scroll"><table><thead><tr><th style="min-width:160px">Conta</th>${MONTHS.map(m=>`<th class="r" style="min-width:90px">${m}</th>`).join('')}<th style="width:40px"></th></tr></thead><tbody>`;
  d.accounts.forEach(acc=>{
    const vals=MONTHS.map((_,mi)=>{const b=d.balances.find(x=>x.accountId===acc.id&&x.month===mi);return b?.balance||0;});
    html+=`<tr><td><strong>${acc.name}</strong><br><span class="sub">${acc.bank||''}</span></td>${vals.map((v,mi)=>`<td><input type="number" class="input-num" value="${v||''}" placeholder="0" data-acc="${acc.id}" data-month="${mi}"></td>`).join('')}<td><button class="btn-sm red" onclick="deleteAcc('${acc.id}')">✕</button></td></tr>`;
  });
  const totals=MONTHS.map((_,mi)=>d.accounts.reduce((s,a)=>{const b=d.balances.find(x=>x.accountId===a.id&&x.month===mi);return s+(b?.balance||0);},0));
  html+=`<tr class="total-row"><td><strong>Total</strong></td>${totals.map(v=>`<td class="r mono bold" style="color:#2e7d32">${fmt(v)}</td>`).join('')}<td></td></tr>`;
  html+=`</tbody></table></div></div>`;
  return html;
}

function renderInvestments(d) {
  const totalApp=d.investments.reduce((s,inv)=>s+(inv.startValue||0),0);
  const allBals=MONTHS.map((_,mi)=>d.investments.reduce((s,inv)=>{const b=d.invBalances.find(x=>x.investmentId===inv.id&&x.month===mi);return s+(b?.balance||0);},0));
  const lastNZ=allBals.reduce((l,v,i)=>v>0?i:l,-1);
  const curBal=lastNZ>=0?allBals[lastNZ]:0;
  const rend=curBal-totalApp;

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h1 class="page-title">Investimentos</h1><p class="page-sub">Saldo com rendimento no fim de cada mês — ${STATE.year}</p></div>`;
  html+=`<button class="btn green" onclick="showInvForm()">+ Novo investimento</button></div>`;

  html+=`<div class="kpi-grid" style="margin-bottom:16px">${kpi('Total aplicado',fmt(totalApp),'','blue')}${kpi('Saldo atual',fmt(curBal),'','green')}${kpi('Rendimento',fmt(rend),totalApp>0?pct(rend/totalApp):'',rend>=0?'green':'red')}</div>`;

  html+=`<div id="inv-form" style="display:none" class="card" style="margin-bottom:16px"><div class="form-row"><input id="if-name" class="input" placeholder="Nome"><input id="if-inst" class="input" placeholder="Instituição"><input id="if-date" type="date" class="input"><input id="if-value" type="number" class="input" placeholder="Valor aplicado"><button class="btn green" onclick="saveInvForm()">Salvar</button><button class="btn" onclick="document.getElementById('inv-form').style.display='none'">Cancelar</button></div></div>`;

  d.investments.forEach(inv=>{
    const vals=MONTHS.map((_,mi)=>{const b=d.invBalances.find(x=>x.investmentId===inv.id&&x.month===mi);return b?.balance||0;});
    const rendMensal=vals.map((v,i)=>{
      if(v===0) return 0;
      // Primeiro mês com saldo: rendimento = saldo - valor aplicado
      // Se houve resgate (saldo caiu), o rendimento reflete isso
      const prev = i===0 ? (inv.startValue||0) : (vals[i-1]||inv.startValue||0);
      return v - prev;
    });
    const lastV=vals.reduce((l,v,i)=>v>0?i:l,-1);
    const invRend=lastV>=0?vals[lastV]-(inv.startValue||0):0;
    const totalResgates = (inv.withdrawals||[]).reduce((s,w)=>s+w.amount,0);

    html+=`<div class="card" style="margin-bottom:12px">`;
    html+=`<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px"><div><strong>${inv.name}</strong><br><span class="sub">${inv.institution||''} ${inv.startDate?'• '+inv.startDate:''} ${inv.startValue?'• Aplicado: '+fmt(inv.startValue):''}</span>`;
    if(inv.startValue>0) html+=`<br><span style="color:${invRend>=0?'#2e7d32':'#c62828'};font-size:12px">Rendimento: ${fmt(invRend)} (${pct(invRend/(inv.startValue||1))})</span>`;
    if(totalResgates>0) html+=`<br><span style="color:#e65100;font-size:12px">Resgates: ${fmt(totalResgates)}</span>`;
    html+=`</div><div style="display:flex;gap:4px"><button class="btn-sm" onclick="showWithdrawForm('${inv.id}')">Resgate</button><button class="btn-sm red" onclick="deleteInv('${inv.id}')">✕</button></div></div>`;

    // Withdrawal form
    html+=`<div id="wf-${inv.id}" style="display:none;margin-bottom:10px;padding:10px;background:#fff8e1;border-radius:8px;border:1px solid #ffe082"><div class="form-row"><input id="wf-date-${inv.id}" type="date" class="input" style="max-width:150px"><input id="wf-amount-${inv.id}" type="number" class="input" placeholder="Valor do resgate" style="max-width:150px"><input id="wf-notes-${inv.id}" class="input" placeholder="Motivo (opcional)"><button class="btn" style="background:#e65100;color:white" onclick="saveWithdraw('${inv.id}')">Salvar resgate</button><button class="btn" onclick="document.getElementById('wf-${inv.id}').style.display='none'">Cancelar</button></div></div>`;

    // Withdrawals list
    if(inv.withdrawals?.length>0) {
      html+=`<div style="margin-bottom:8px;font-size:12px">`;
      inv.withdrawals.forEach((w,wi)=>{
        html+=`<div style="display:flex;gap:8px;padding:3px 0;color:#795548"><span>${w.date||'-'}</span><span class="mono" style="color:#e65100">${fmt(w.amount)}</span><span style="color:#999">${w.notes||''}</span></div>`;
      });
      html+=`</div>`;
    }

    html+=`<div class="table-scroll"><table><thead><tr><th></th>${MONTHS.map(m=>`<th class="r" style="min-width:90px">${m}</th>`).join('')}</tr></thead><tbody>`;
    html+=`<tr><td style="font-size:12px;font-weight:500">Saldo</td>${vals.map((v,mi)=>`<td><input type="number" class="input-num" value="${v||''}" placeholder="0" data-inv="${inv.id}" data-month="${mi}"></td>`).join('')}</tr>`;
    html+=`<tr><td style="font-size:11px;color:#999">Rend.</td>${rendMensal.map(v=>`<td class="r mono" style="font-size:11px;color:${v>0?'#2e7d32':v<0?'#c62828':'#ccc'}">${v!==0?fmt(v):'-'}</td>`).join('')}</tr>`;
    html+=`</tbody></table></div></div>`;
  });
  return html;
}

function renderReports() {
  let html=`<h1 class="page-title">Relatórios</h1><p class="page-sub">Exporte PDF para documentar e imprimir</p>`;
  html+=`<div class="card" style="margin-bottom:12px"><h3 class="card-title">Relatório mensal</h3><p class="sub" style="margin-bottom:10px">DRE + patrimônio + assinatura</p><div style="display:flex;flex-wrap:wrap;gap:6px">`;
  MONTHS.forEach((m,i)=>{html+=`<button class="btn" onclick="exportPDF(${STATE.year},${i},STATE.calc)">📄 ${m}</button>`;});
  html+=`</div></div>`;
  return html;
}

function kpi(label,value,sub,color) {
  const c=color==='green'?'#2e7d32':color==='red'?'#c62828':color==='blue'?'#1565c0':color==='amber'?'#e65100':'#333';
  return `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value" style="color:${c}">${value}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}

// =====================================================
// EVENT HANDLERS
// =====================================================
function attachEvents() {
  document.querySelectorAll('input[data-cat]').forEach(el=>{
    el.onblur = async function() {
      await saveEntry(this.dataset.cat, STATE.year, +this.dataset.month, this.value, this.dataset.type);
      // Don't reload, just update local
    };
  });
  document.querySelectorAll('input[data-acc]').forEach(el=>{
    el.onblur = async function() {
      await saveMonthlyBalance(this.dataset.acc, STATE.year, +this.dataset.month, this.value);
    };
  });
  document.querySelectorAll('input[data-inv]').forEach(el=>{
    el.onblur = async function() {
      await saveInvBalance(this.dataset.inv, STATE.year, +this.dataset.month, this.value);
    };
  });
}

// Global functions
window.setTab = setTab;
window.setYear = setYear;
window.toggleExp = toggleExp;
window.seedCategories = seedCategories;
window.exportPDF = exportPDF;
window.STATE = STATE;

window.showCatForm = (type) => { document.getElementById(`cat-form-${type}`).style.display='block'; };
window.hideCatForm = (type) => { document.getElementById(`cat-form-${type}`).style.display='none'; };
window.saveCatForm = async (type) => {
  const name=document.getElementById(`cf-name-${type}`).value;
  const group=document.getElementById(`cf-group-${type}`).value;
  const order=+document.getElementById(`cf-order-${type}`).value||50;
  if(!name) return alert('Digite o nome');
  const d = type==='revenue' ? {name,sector:group,group,type,order} : {name,group,type,order};
  await saveCategory(d);
  document.getElementById(`cat-form-${type}`).style.display='none';
  reload();
};
window.deleteCat = async (id) => { if(confirm('Excluir?')){await deleteCategory(id);reload();}};

window.showAccForm = () => document.getElementById('acc-form').style.display='block';
window.saveAccForm = async () => {
  const name=document.getElementById('af-name').value;
  const bank=document.getElementById('af-bank').value;
  if(!name) return alert('Digite o nome');
  await saveAccount({name,bank,order:d.accounts?.length||0+1});
  document.getElementById('acc-form').style.display='none';
  reload();
};
window.deleteAcc = async (id) => { if(confirm('Excluir?')){await deleteAccount(id);reload();}};

window.showInvForm = () => document.getElementById('inv-form').style.display='block';
window.saveInvForm = async () => {
  const name=document.getElementById('if-name').value;
  if(!name) return alert('Digite o nome');
  await saveInvestment({name,institution:document.getElementById('if-inst').value,startDate:document.getElementById('if-date').value,startValue:+document.getElementById('if-value').value||0,withdrawals:[],order:STATE.data.investments.length+1});
  document.getElementById('inv-form').style.display='none';
  reload();
};
window.deleteInv = async (id) => { if(confirm('Excluir?')){await deleteInvestment(id);reload();}};

window.showWithdrawForm = (id) => document.getElementById(`wf-${id}`).style.display='block';
window.saveWithdraw = async (invId) => {
  const inv = STATE.data.investments.find(x=>x.id===invId);
  if(!inv) return;
  const date = document.getElementById(`wf-date-${invId}`).value;
  const amount = +document.getElementById(`wf-amount-${invId}`).value||0;
  const notes = document.getElementById(`wf-notes-${invId}`).value;
  if(!amount) return alert('Digite o valor');
  const withdrawals = [...(inv.withdrawals||[]), {date,amount,notes}];
  await saveInvestment({...inv, withdrawals});
  document.getElementById(`wf-${invId}`).style.display='none';
  reload();
};

window.setViewMode = (m) => {
  STATE.viewMode=m;
  document.getElementById('btn-acc').classList.toggle('active',m==='accumulated');
  document.getElementById('btn-month').classList.toggle('active',m==='monthly');
  document.getElementById('month-select-wrap').style.display=m==='monthly'?'block':'none';
  render();
};
window.setViewMonth = (m) => { STATE.viewMonth=+m; render(); };

// INIT
reload();
</script>
<style>

.view-toggle{display:flex;gap:4px;margin-top:8px}
.view-btn{padding:4px 10px;border:0;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit;background:#f0f4f0;color:#888;transition:all .15s}
.view-btn.active{background:#e8f5e9;color:#1b5e20;font-weight:600}
#loading{position:fixed;inset:0;background:rgba(248,250,248,.9);display:flex;align-items:center;justify-content:center;z-index:99}
.spinner{width:32px;height:32px;border:3px solid #c8e6c9;border-top-color:#1b5e20;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){body{flex-direction:column}.sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:8px;gap:4px}.sidebar .logo{display:none}.sidebar .bottom{display:none}.nav-btn{white-space:nowrap;padding:8px 12px}.main{max-height:none}.kpi-grid{grid-template-columns:repeat(2,1fr)}.sector-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>

<!-- TELA DE CONFIGURAÇÃO -->
<div id="setup-screen" style="display:none;position:fixed;inset:0;background:#f8faf8;z-index:200;align-items:center;justify-content:center">
  <div style="background:#fff;border:1px solid #e4eae4;border-radius:16px;padding:36px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.08)">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:36px;margin-bottom:8px">🔥</div>
      <h2 style="font-size:20px;font-weight:700;color:#1a2e1a;margin-bottom:6px">Conectar ao Firebase</h2>
      <p style="font-size:13px;color:#888">Cole as informações do seu Realtime Database</p>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#999;display:block;margin-bottom:5px">URL do Realtime Database</label>
      <input id="setup-dburl" class="input" style="width:100%;font-size:13px;padding:10px 12px" placeholder="https://financeiro-intervet-default-rtdb.firebaseio.com">
      <p style="font-size:11px;color:#aaa;margin-top:5px">Firebase Console → Realtime Database → copie a URL do topo</p>
    </div>
    <div style="margin-bottom:22px">
      <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#999;display:block;margin-bottom:5px">API Key</label>
      <input id="setup-apikey" class="input" style="width:100%;font-size:14px;padding:10px 12px" placeholder="AIzaSy...">
      <p style="font-size:11px;color:#aaa;margin-top:5px">Firebase Console → ⚙️ Configurações → Seus apps → Config</p>
    </div>
    <button id="btn-conectar" onclick="conectarFirebase()" style="width:100%;padding:12px;background:#1b5e20;color:#fff;border:0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">🔗 Conectar e Salvar</button>
  </div>
</div>

<nav class="sidebar">
  <div class="logo">Intervet<span>Centro Veterinário • Financeiro</span></div>
  <button class="nav-btn active" data-tab="dashboard" onclick="setTab('dashboard')">📊 Dashboard</button>
  <button class="nav-btn" data-tab="dre" onclick="setTab('dre')">📋 DRE</button>
  <button class="nav-btn" data-tab="revenue" onclick="setTab('revenue')">💰 Receitas</button>
  <button class="nav-btn" data-tab="expenses" onclick="setTab('expenses')">💸 Despesas</button>
  <button class="nav-btn" data-tab="accounts" onclick="setTab('accounts')">🏦 Contas</button>
  <button class="nav-btn" data-tab="investments" onclick="setTab('investments')">📈 Investimentos</button>
  <button class="nav-btn" data-tab="reports" onclick="setTab('reports')">🖨️ Relatórios</button>
  <div class="bottom" style="margin-top:auto;padding-top:12px;border-top:1px solid #e4eae4">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="font-size:11px;color:#999">Ano:</span><select id="year-select" class="input" style="font-size:12px;font-weight:600;padding:4px 6px" onchange="setYear(this.value)"><option>2023</option><option>2024</option><option>2025</option><option>2026</option><option>2027</option></select></div>
    <div class="view-toggle"><button id="btn-acc" class="view-btn active" onclick="setViewMode('accumulated')">Acumulado</button><button id="btn-month" class="view-btn" onclick="setViewMode('monthly')">Mensal</button></div>
    <div id="month-select-wrap" style="display:none;margin-top:6px"><select class="input" style="font-size:11px;width:100%" onchange="setViewMonth(this.value)">${MONTHS.map((m,i)=>`<option value="${i}">${m}</option>`).join('')}</select></div>
    <button style="margin-top:10px;font-size:9px;color:#bbb;background:0;border:0;cursor:pointer;text-decoration:underline" onclick="seedCategories()">Criar categorias padrão</button>
    <button style="margin-top:4px;font-size:9px;color:#bbb;background:0;border:0;cursor:pointer;text-decoration:underline" onclick="resetConfig()">⚙️ Trocar projeto</button>
  </div>
</nav>

<main class="main" id="app-content"></main>
</body>
</html>
