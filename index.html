import{initializeApp}from"https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import{getDatabase,ref,set,get,remove}from"https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

// CONFIG DINÂMICA
const STORAGE_KEY='intervet_finance_rtdb_config';
function getSavedConfig(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');}catch{return null;}}
const savedConfig=getSavedConfig();
if(!savedConfig){document.getElementById('loading').style.display='none';document.getElementById('setup-screen').style.display='flex';}
window.conectarFirebase=function(){
  const dbURL=document.getElementById('setup-dburl').value.trim();
  const apiKey=document.getElementById('setup-apikey').value.trim();
  if(!dbURL)return alert('Cole a URL do banco!');
  if(!apiKey)return alert('Cole a API Key!');
  const projectId=dbURL.replace('https://','').replace(/-default-rtdb\.firebaseio\.com.*/,'');
  const config={apiKey,authDomain:`${projectId}.firebaseapp.com`,databaseURL:dbURL,projectId,storageBucket:`${projectId}.firebasestorage.app`,appId:'placeholder'};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(config));
  location.reload();
};
if(!savedConfig){throw new Error('Aguardando config');}
const app=initializeApp(savedConfig);
const db=getDatabase(app);

const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const fmt=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0});
const pct=v=>((v||0)*100).toFixed(1)+'%';
const init12=()=>Array(12).fill(0);
const objToArr=obj=>obj?Object.values(obj):[];

// CRUD
async function loadAll(year){
  const snap=await get(ref(db));
  const data=snap.val()||{};
  const cats=objToArr(data.categories).sort((a,b)=>(a.order||0)-(b.order||0));
  const entries=objToArr(data.entries).filter(e=>e.year===year);
  const accs=objToArr(data.accounts).sort((a,b)=>(a.order||0)-(b.order||0));
  const bals=objToArr(data.balances_monthly).filter(b=>b.year===year);
  const invs=objToArr(data.investments).sort((a,b)=>(a.order||0)-(b.order||0));
  const ibals=objToArr(data.investment_balances).filter(b=>b.year===year);
  const cofre=data.cofre||{};
  return{categories:cats,revEntries:entries.filter(e=>e.type==='revenue'),expEntries:entries.filter(e=>e.type==='expense'),accounts:accs,balances:bals,investments:invs,invBalances:ibals,cofre};
}
async function saveCategory(d){const id=d.id||`cat_${Date.now()}_${Math.random().toString(36).substr(2,5)}`;await set(ref(db,`categories/${id}`),{...d,id});}
async function deleteCategory(id){await remove(ref(db,`categories/${id}`));}
async function saveEntry(catId,year,month,amount,type){await set(ref(db,`entries/${catId}_${year}_${month}`),{categoryId:catId,year,month,amount:Number(amount)||0,type});}
async function saveAccount(d){const id=d.id||`acc_${Date.now()}`;await set(ref(db,`accounts/${id}`),{...d,id});}
async function deleteAccount(id){await remove(ref(db,`accounts/${id}`));}
async function saveMonthlyBalance(accId,year,month,balance){await set(ref(db,`balances_monthly/${accId}_${year}_${month}`),{accountId:accId,year,month,balance:Number(balance)||0});}
async function saveInvestment(d){const id=d.id||`inv_${Date.now()}`;await set(ref(db,`investments/${id}`),{...d,id});}
async function deleteInvestment(id){await remove(ref(db,`investments/${id}`));}
async function saveInvBalance(invId,year,month,balance){await set(ref(db,`investment_balances/${invId}_${year}_${month}`),{investmentId:invId,year,month,balance:Number(balance)||0});}

// CÁLCULO
function calcRange(data,months){
  const c={revByMonth:init12(),revBySector:{},revByCat:{},expByGroup:{},expByCat:{},expByMonth:init12()};
  data.categories.filter(x=>x.type==='revenue').forEach(cat=>{
    const s=cat.sector||'Outros';
    if(!c.revBySector[s])c.revBySector[s]=init12();
    c.revByCat[cat.id]=init12();
    data.revEntries.filter(e=>e.categoryId===cat.id).forEach(e=>{c.revByCat[cat.id][e.month]=e.amount;c.revByMonth[e.month]+=e.amount;c.revBySector[s][e.month]+=e.amount;});
  });
  data.categories.filter(x=>x.type==='expense').forEach(cat=>{
    const g=cat.group||'Outros';
    if(!c.expByGroup[g])c.expByGroup[g]=init12();
    c.expByCat[cat.id]=init12();
    data.expEntries.filter(e=>e.categoryId===cat.id).forEach(e=>{c.expByCat[cat.id][e.month]=e.amount;c.expByMonth[e.month]+=e.amount;c.expByGroup[g][e.month]+=e.amount;});
  });
  const S=arr=>months.reduce((s,m)=>s+(arr[m]||0),0);
  const rev=S(c.revByMonth);
  const imp=S(c.expByGroup['Impostos']||init12());
  const cmv=S(c.expByGroup['CMV / CSP']||init12());
  const pes=S(c.expByGroup['Pessoal']||init12());
  const sga=S(c.expByGroup['SG&A']||init12());
  const fin=S(c.expByGroup['Financeiras']||init12());
  const lucroBruto=rev-imp-cmv;
  const ebitda=lucroBruto-pes-sga;
  const lucroLiq=ebitda-fin;
  c.ebitdaMensal=c.revByMonth.map((_,i)=>c.revByMonth[i]-(c.expByGroup['Impostos']?.[i]||0)-(c.expByGroup['CMV / CSP']?.[i]||0)-(c.expByGroup['Pessoal']?.[i]||0)-(c.expByGroup['SG&A']?.[i]||0));
  c.lucroLiqMensal=c.ebitdaMensal.map((v,i)=>v-(c.expByGroup['Financeiras']?.[i]||0));
  c.revTotal=rev;c.impTotal=imp;c.cmvTotal=cmv;c.pesTotal=pes;c.sgaTotal=sga;c.finTotal=fin;
  c.lucroBrutoTotal=lucroBruto;c.ebitdaTotal=ebitda;c.lucroLiqTotal=lucroLiq;
  c.expTotal=imp+cmv+pes+sga+fin;
  c.mBruta=rev>0?lucroBruto/rev:0;c.mEbitda=rev>0?ebitda/rev:0;c.mLiq=rev>0?lucroLiq/rev:0;
  c.saldoContas=init12();
  data.accounts.forEach(a=>data.balances.filter(b=>b.accountId===a.id).forEach(b=>{c.saldoContas[b.month]+=b.balance;}));
  c.saldoInv=init12();
  data.investments.forEach(inv=>data.invBalances.filter(b=>b.investmentId===inv.id).forEach(b=>{c.saldoInv[b.month]+=b.balance;}));
  c.patrimonio=c.saldoContas.map((v,i)=>v+c.saldoInv[i]);
  c.revBySectorTotal={};Object.entries(c.revBySector).forEach(([s,arr])=>{c.revBySectorTotal[s]=S(arr);});
  c.expByGroupTotal={};Object.entries(c.expByGroup).forEach(([g,arr])=>{c.expByGroupTotal[g]=S(arr);});
  c.expByCatTotal={};Object.entries(c.expByCat).forEach(([id,arr])=>{c.expByCatTotal[id]=S(arr);});
  c.revByCatTotal={};Object.entries(c.revByCat).forEach(([id,arr])=>{c.revByCatTotal[id]=S(arr);});
  return c;
}

// PDF
function exportPDF(label,calc){
  try{
  const jsPDF=(window.jspdf?.jsPDF)||(window.jsPDF?.jsPDF)||window.jsPDF;
  if(!jsPDF){alert('PDF ainda carregando. Tente em alguns segundos.');return;}
  const pdf=new jsPDF('p','mm','a4');const w=pdf.internal.pageSize.getWidth();const G=[27,94,32];
  pdf.setFillColor(...G);pdf.rect(0,0,w,24,'F');
  pdf.setTextColor(255,255,255);pdf.setFontSize(15);pdf.setFont('helvetica','bold');pdf.text('Intervet Centro Veterinário',14,10);
  pdf.setFontSize(10);pdf.setFont('helvetica','normal');pdf.text(`DRE — ${label} — Regime de Caixa`,14,17);pdf.text(new Date().toLocaleDateString('pt-BR'),14,22);
  const rows=[['Receita bruta',fmt(calc.revTotal),'100%'],['(-) Impostos (Simples)',fmt(-calc.impTotal),pct(calc.revTotal>0?-calc.impTotal/calc.revTotal:0)],['(-) CMV / CSP',fmt(-calc.cmvTotal),pct(calc.revTotal>0?-calc.cmvTotal/calc.revTotal:0)],['= Lucro bruto',fmt(calc.lucroBrutoTotal),pct(calc.mBruta)],['(-) Pessoal',fmt(-calc.pesTotal),''],['(-) SG&A',fmt(-calc.sgaTotal),''],['= EBITDA (Caixa)',fmt(calc.ebitdaTotal),pct(calc.mEbitda)],['(-) Financeiras',fmt(-calc.finTotal),''],['= Lucro líquido',fmt(calc.lucroLiqTotal),pct(calc.mLiq)]];
  pdf.autoTable({startY:30,head:[['Conta','Valor','% Receita']],body:rows,theme:'striped',headStyles:{fillColor:G,fontSize:9},bodyStyles:{fontSize:9},columnStyles:{0:{cellWidth:80},1:{halign:'right'},2:{halign:'right'}},margin:{left:14,right:14},didParseCell:d=>{if(d.section==='body'&&rows[d.row.index]?.[0]?.startsWith('=')){d.cell.styles.fontStyle='bold';d.cell.styles.fillColor=[232,245,233];}}});
  pdf.save(`Intervet_DRE_${label.replace(/[\s\/]/g,'_')}.pdf`);
  }catch(e){alert('Erro ao gerar PDF: '+e.message);}
}

// STATE
let STATE={year:new Date().getFullYear(),tab:'dashboard',data:null,calc:null,viewMode:'monthly',selectedMonths:[new Date().getMonth()],rangeStart:0,rangeEnd:new Date().getMonth(),compareMonths:[[new Date().getMonth(),new Date().getFullYear()],[new Date().getMonth(),new Date().getFullYear()-1]],expanded:{},editingCat:null};

async function reload(){
  document.getElementById('loading').style.display='flex';
  STATE.data=await loadAll(STATE.year);
  STATE.calc=calcRange(STATE.data,getActiveMonths());
  render();
  document.getElementById('loading').style.display='none';
}
function getActiveMonths(){
  if(STATE.viewMode==='compare')return[STATE.compareMonths[0][0]];
  return STATE.selectedMonths;
}
function setTab(t){STATE.tab=t;render();}
function setYear(y){STATE.year=+y;reload();}
function toggleExp(k){STATE.expanded[k]=!STATE.expanded[k];render();}
window.setTab=setTab;window.setYear=setYear;window.toggleExp=toggleExp;

// PERIOD
function renderPeriodSelector(){
  const vm=STATE.viewMode;
  let h=`<div class="period-bar"><div class="period-tabs">`;
  h+=`<button class="ptab ${vm==='monthly'?'active':''}" onclick="setPeriodMode('monthly')">Mensal</button>`;
  h+=`<button class="ptab ${vm==='range'?'active':''}" onclick="setPeriodMode('range')">Período</button>`;
  h+=`<button class="ptab ${vm==='compare'?'active':''}" onclick="setPeriodMode('compare')">Comparar</button>`;
  h+=`</div>`;
  if(vm==='monthly'){
    h+=`<div class="month-pills">`;
    MONTHS.forEach((m,i)=>h+=`<button class="mpill ${STATE.selectedMonths.includes(i)?'active':''}" onclick="toggleMonth(${i})">${m}</button>`);
    h+=`</div>`;
  } else if(vm==='range'){
    h+=`<div class="range-row"><span class="sub">De</span><select class="input" onchange="setRangeStart(this.value)" style="font-size:12px;padding:4px 8px">${MONTHS.map((m,i)=>`<option value="${i}" ${STATE.rangeStart===i?'selected':''}>${m}</option>`).join('')}</select><span class="sub">até</span><select class="input" onchange="setRangeEnd(this.value)" style="font-size:12px;padding:4px 8px">${MONTHS.map((m,i)=>`<option value="${i}" ${STATE.rangeEnd===i?'selected':''}>${m}</option>`).join('')}</select><span class="sub">${STATE.year}</span></div>`;
  } else {
    const[a,b]=STATE.compareMonths;
    h+=`<div class="range-row"><span class="sub" style="color:#1b5e20;font-weight:600">A:</span><select class="input" onchange="setCmpM(0,this.value)" style="font-size:12px;padding:4px 8px">${MONTHS.map((m,i)=>`<option value="${i}" ${a[0]===i?'selected':''}>${m}</option>`).join('')}</select><select class="input" onchange="setCmpY(0,this.value)" style="font-size:12px;padding:4px 8px">${[2023,2024,2025,2026,2027].map(y=>`<option value="${y}" ${a[1]===y?'selected':''}>${y}</option>`).join('')}</select><span class="sub" style="color:#c62828;font-weight:600;margin-left:8px">B:</span><select class="input" onchange="setCmpM(1,this.value)" style="font-size:12px;padding:4px 8px">${MONTHS.map((m,i)=>`<option value="${i}" ${b[0]===i?'selected':''}>${m}</option>`).join('')}</select><select class="input" onchange="setCmpY(1,this.value)" style="font-size:12px;padding:4px 8px">${[2023,2024,2025,2026,2027].map(y=>`<option value="${y}" ${b[1]===y?'selected':''}>${y}</option>`).join('')}</select></div>`;
  }
  h+=`</div>`;return h;
}
window.setPeriodMode=m=>{STATE.viewMode=m;if(m==='range')STATE.selectedMonths=rangeArr(STATE.rangeStart,STATE.rangeEnd);reloadCalc();};
window.toggleMonth=i=>{const idx=STATE.selectedMonths.indexOf(i);if(idx>=0){if(STATE.selectedMonths.length>1)STATE.selectedMonths.splice(idx,1);}else STATE.selectedMonths.push(i);STATE.selectedMonths.sort((a,b)=>a-b);reloadCalc();};
window.setRangeStart=v=>{STATE.rangeStart=+v;STATE.selectedMonths=rangeArr(STATE.rangeStart,STATE.rangeEnd);reloadCalc();};
window.setRangeEnd=v=>{STATE.rangeEnd=+v;STATE.selectedMonths=rangeArr(STATE.rangeStart,STATE.rangeEnd);reloadCalc();};
window.setCmpM=(idx,v)=>{STATE.compareMonths[idx][0]=+v;reloadCalc();};
window.setCmpY=(idx,v)=>{STATE.compareMonths[idx][1]=+v;reloadCalc();};
function rangeArr(s,e){const a=[];for(let i=Math.min(s,e);i<=Math.max(s,e);i++)a.push(i);return a;}
async function reloadCalc(){
  if(!STATE.data)return;
  if(STATE.viewMode==='compare'){
    const[a,b]=STATE.compareMonths;
    const dA=a[1]===STATE.year?STATE.data:await loadAll(a[1]);
    const dB=b[1]===STATE.year?STATE.data:await loadAll(b[1]);
    STATE.calcA=calcRange(dA,[a[0]]);STATE.calcB=calcRange(dB,[b[0]]);STATE.calc=STATE.calcA;
  } else {STATE.calc=calcRange(STATE.data,STATE.selectedMonths);}
  render();
}
function getPeriodLabel(){
  if(STATE.viewMode==='monthly'){if(STATE.selectedMonths.length===1)return`${MONTHS[STATE.selectedMonths[0]]} / ${STATE.year}`;return STATE.selectedMonths.map(m=>MONTHS[m]).join(', ')+` / ${STATE.year}`;}
  if(STATE.viewMode==='range')return`${MONTHS[Math.min(...STATE.selectedMonths)]}–${MONTHS[Math.max(...STATE.selectedMonths)]} / ${STATE.year}`;
  const[a,b]=STATE.compareMonths;return`${MONTHS[a[0]]}/${a[1]} vs ${MONTHS[b[0]]}/${b[1]}`;
}

// RENDER
function render(){
  if(!STATE.data||!STATE.calc)return;
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.toggle('active',el.dataset.tab===STATE.tab));
  document.getElementById('year-select').value=STATE.year;
  document.getElementById('period-bar-container').innerHTML=renderPeriodSelector();
  const app=document.getElementById('app-content');
  if(STATE.tab==='dashboard')app.innerHTML=renderDashboard();
  else if(STATE.tab==='dre')app.innerHTML=renderDRE();
  else if(STATE.tab==='revenue')app.innerHTML=renderEntries('revenue');
  else if(STATE.tab==='expenses')app.innerHTML=renderEntries('expense');
  else if(STATE.tab==='accounts')app.innerHTML=renderAccounts();
  else if(STATE.tab==='investments')app.innerHTML=renderInvestments();
  else if(STATE.tab==='reports')app.innerHTML=renderReports();
  attachEvents();
}

function kpi(label,value,sub,color){
  const col=color==='green'?'#2e7d32':color==='red'?'#c62828':color==='blue'?'#1565c0':color==='amber'?'#e65100':'#333';
  return`<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value" style="color:${col}">${value}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}

// DASHBOARD
function renderDashboard(){
  const c=STATE.calc;const d=STATE.data;const label=getPeriodLabel();
  const lastM=STATE.viewMode==='monthly'?STATE.selectedMonths[STATE.selectedMonths.length-1]:STATE.selectedMonths[STATE.selectedMonths.length-1]||0;
  const contas=c.saldoContas[lastM]||0;
  const saldoInvAtual=c.saldoInv[lastM]||0;
  const totalAplicado=d.investments.reduce((s,inv)=>s+(inv.startValue||0),0);
  const cofre=STATE.data.cofre||{};
  const cofreAtualDash=cofre[`${STATE.year}_${lastM}`]||0;
  const pat=(c.patrimonio[lastM]||0)+cofreAtualDash;
  let cmpHtml='';
  if(STATE.viewMode==='compare'&&STATE.calcA&&STATE.calcB){
    const[a,b]=STATE.compareMonths;
    cmpHtml=`<div class="card" style="margin-top:16px"><h3 class="card-title">Comparativo: ${MONTHS[a[0]]}/${a[1]} vs ${MONTHS[b[0]]}/${b[1]}</h3><div class="table-scroll"><table><thead><tr><th>Indicador</th><th class="r">${MONTHS[a[0]]}/${a[1]}</th><th class="r">${MONTHS[b[0]]}/${b[1]}</th><th class="r">Variação</th></tr></thead><tbody>`;
    [['Receita',STATE.calcA.revTotal,STATE.calcB.revTotal],['Despesas',STATE.calcA.expTotal,STATE.calcB.expTotal],['Lucro bruto',STATE.calcA.lucroBrutoTotal,STATE.calcB.lucroBrutoTotal],['EBITDA',STATE.calcA.ebitdaTotal,STATE.calcB.ebitdaTotal],['Lucro líquido',STATE.calcA.lucroLiqTotal,STATE.calcB.lucroLiqTotal]].forEach(([l,v1,v2])=>{
      const diff=v1-v2;const cl=diff>=0?'#2e7d32':'#c62828';
      cmpHtml+=`<tr><td>${l}</td><td class="r mono">${fmt(v1)}</td><td class="r mono">${fmt(v2)}</td><td class="r mono" style="color:${cl}">${diff>=0?'+':''}${fmt(diff)}</td></tr>`;
    });
    cmpHtml+=`</tbody></table></div></div>`;
  }
  let html=`<h1 class="page-title">Dashboard</h1><p class="page-sub">${label}</p>`;
  html+=`<div class="kpi-grid">${kpi('Receita',fmt(c.revTotal),'','green')}${kpi('Despesas',fmt(c.expTotal),'total do período','red')}${kpi('EBITDA',fmt(c.ebitdaTotal),`Margem: ${pct(c.mEbitda)}`,c.ebitdaTotal>=0?'green':'red')}${kpi('Lucro líquido',fmt(c.lucroLiqTotal),`Margem: ${pct(c.mLiq)}`,c.lucroLiqTotal>=0?'green':'red')}</div>`;

  [{l:'Receita',v:fc.revByMonth,t:fc.revTotal},{l:'Despesas',v:fc.expByMonth,t:fc.expTotal},{l:'EBITDA',v:fc.ebitdaMensal,t:fc.ebitdaTotal},{l:'Lucro líq.',v:fc.lucroLiqMensal,t:fc.lucroLiqTotal}].forEach(r=>{

}

// DRE
function renderDRE(){
  const c=STATE.calc;const d=STATE.data;const rev=c.revTotal;
  function dreRow(label,value,opts={}){
    const{bold,big,color,indent,ek,sub}=opts;
    const arrow=ek?(STATE.expanded[ek]?'▾ ':'▸ '):'';
    const pctTxt=typeof value==='number'&&rev>0?`<span style="color:#bbb;font-size:11px">${pct(value/rev)}</span>`:'';
    const valStr=typeof value==='number'?fmt(value):value;
    return`<tr class="dre-row ${ek?'clickable':''}" ${ek?`onclick="window.toggleExp('${ek}')"`:''}><td style="color:${color||'inherit'};font-weight:${bold?'700':'400'};font-size:${big?'15px':'13px'};padding-left:${indent?'28px':'12px'}">${arrow}${label}${sub?`<br><span style="font-size:10px;color:#bbb;font-weight:400">${sub}</span>`:''}</td><td class="r mono" style="color:${color||'inherit'};font-weight:${bold?'700':'400'};font-size:${big?'15px':'13px'}">${valStr}</td><td class="r">${pctTxt}</td></tr>`;
  }
  let html=`<h1 class="page-title">DRE — Regime de Caixa</h1><p class="page-sub">${getPeriodLabel()} — clique nas linhas para detalhar</p>`;
  html+=`<div class="card" style="padding:0;overflow:hidden;max-width:720px"><table class="dre-table"><thead><tr><th style="width:55%">Conta</th><th class="r">Valor</th><th class="r">% Receita</th></tr></thead><tbody>`;
  html+=dreRow('Receita bruta',rev,{bold:1,big:1,color:'#2e7d32',ek:'rev',sub:'Total de entradas de clientes'});
  if(STATE.expanded.rev){Object.entries(c.revBySectorTotal||{}).forEach(([s,t])=>html+=dreRow(s,t,{indent:1}));d.categories.filter(x=>x.type==='revenue').forEach(cat=>{const t=c.revByCatTotal[cat.id]||0;if(t>0)html+=dreRow('  '+cat.name,t,{indent:1});});}
  html+=dreRow('(-) Impostos (Simples Nacional)',-c.impTotal,{color:'#c62828',ek:'imp',sub:'Guia DAS paga no mês'});
  if(STATE.expanded.imp)d.categories.filter(x=>x.group==='Impostos').forEach(cat=>{const t=c.expByCatTotal[cat.id]||0;if(t>0)html+=dreRow(cat.name,-t,{indent:1});});
  html+=dreRow('(-) CMV / CSP',-c.cmvTotal,{color:'#c62828',ek:'cmv',sub:'Pagamentos a fornecedores'});
  if(STATE.expanded.cmv)d.categories.filter(x=>x.group==='CMV / CSP').forEach(cat=>{const t=c.expByCatTotal[cat.id]||0;if(t>0)html+=dreRow(cat.name,-t,{indent:1});});
  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('= Lucro bruto',c.lucroBrutoTotal,{bold:1,big:1,color:c.lucroBrutoTotal>=0?'#2e7d32':'#c62828'});
  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('(-) Pessoal',-c.pesTotal,{color:'#c62828',ek:'pes',sub:'Salários, encargos e benefícios'});
  if(STATE.expanded.pes)d.categories.filter(x=>x.group==='Pessoal').forEach(cat=>{const t=c.expByCatTotal[cat.id]||0;if(t>0)html+=dreRow(cat.name,-t,{indent:1});});
  html+=dreRow('(-) SG&A',-c.sgaTotal,{color:'#c62828',ek:'sga',sub:'Aluguel, luz, marketing e outras contas'});
  if(STATE.expanded.sga)d.categories.filter(x=>x.group==='SG&A').forEach(cat=>{const t=c.expByCatTotal[cat.id]||0;if(t>0)html+=dreRow(cat.name,-t,{indent:1});});
  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('= EBITDA (Caixa)',c.ebitdaTotal,{bold:1,big:1,color:c.ebitdaTotal>=0?'#2e7d32':'#c62828',sub:'Geração de caixa operacional'});
  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('(-) Financeiras',-c.finTotal,{color:'#c62828',ek:'fin',sub:'Tarifas bancárias e juros'});
  if(STATE.expanded.fin)d.categories.filter(x=>x.group==='Financeiras').forEach(cat=>{const t=c.expByCatTotal[cat.id]||0;if(t>0)html+=dreRow(cat.name,-t,{indent:1});});
  html+=`<tr><td colspan="3" class="sep"></td></tr>`;
  html+=dreRow('= Lucro líquido',c.lucroLiqTotal,{bold:1,big:1,color:c.lucroLiqTotal>=0?'#2e7d32':'#c62828',sub:'Sobra de caixa final do período'});
  html+=`</tbody></table></div>`;
  html+=`<div class="kpi-grid" style="margin-top:16px;max-width:720px">${kpi('Margem bruta',pct(c.mBruta),'',c.mBruta>.4?'green':'amber')}${kpi('Margem EBITDA',pct(c.mEbitda),'',c.mEbitda>.15?'green':'amber')}${kpi('Margem líquida',pct(c.mLiq),'',c.mLiq>.08?'green':'red')}</div>`;
  html+=`<button class="btn" style="margin-top:12px" onclick="exportPDF('${getPeriodLabel()}',STATE.calc)">📄 Exportar PDF</button>`;
  return html;
}

  Object.entries(groups).forEach(([grp,gcats])=>{
    html+=`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="badge" style="background:${isRev?'#e8f5e9':'#fce4ec'};color:${isRev?'#2e7d32':'#c62828'}">${grp}</span>
      <button class="btn-sm green" onclick="showGroupForm('${grp}','${type}')">+ Adicionar</button>
    </div>
    <div id="gf-${grp.replace(/[^a-z0-9]/gi,'_')}" style="display:none;margin-bottom:10px;padding:10px;background:#f9fbe7;border-radius:8px;border:1px solid #dce775">
      <div class="form-row">
        <input id="gf-name-${grp.replace(/[^a-z0-9]/gi,'_')}" class="input" placeholder="Nome da categoria" style="min-width:200px">
        <button class="btn green" onclick="saveGroupForm('${grp}','${type}')">Salvar</button>
        <button class="btn" onclick="hideGroupForm('${grp}')">Cancelar</button>
      </div>
    </div>
    <div class="table-scroll"><table><thead><tr><th style="min-width:180px">Categoria</th>${MONTHS.map(m=>`<th class="r" style="min-width:78px">${m}</th>`).join('')}<th class="r">Total</th><th style="width:80px">Ações</th></tr></thead><tbody>`;
    gcats.forEach(cat=>{
      const isEdit=STATE.editingCat===cat.id;
      const vals=MONTHS.map((_,mi)=>{const e=entries.find(x=>x.categoryId===cat.id&&x.month===mi);return e?.amount||0;});
      const total=vals.reduce((a,b)=>a+b,0);
      if(isEdit){
        html+=`<tr style="background:#f1f8e9"><td><input id="edit-name-${cat.id}" class="input" value="${cat.name}" style="width:100%"></td>${vals.map((v,mi)=>`<td><input type="number" class="input-num" value="${v||''}" placeholder="0" data-cat="${cat.id}" data-month="${mi}" data-type="${type}"></td>`).join('')}<td class="r mono bold">${fmt(total)}</td><td><button class="btn-sm green" onclick="saveCatEdit('${cat.id}')">✓</button> <button class="btn-sm" onclick="cancelCatEdit()">✕</button></td></tr>`;
      } else {
        html+=`<tr><td>${cat.name}</td>${vals.map((v,mi)=>`<td><input type="number" class="input-num" value="${v||''}" placeholder="0" data-cat="${cat.id}" data-month="${mi}" data-type="${type}"></td>`).join('')}<td class="r mono bold">${fmt(total)}</td><td><button class="btn-sm" onclick="startEditCat('${cat.id}')">✏️</button> <button class="btn-sm red" onclick="deleteCatConfirm('${cat.id}')">🗑</button></td></tr>`;
      }
    });
    html+=`</tbody></table></div></div>`;
  });
  return html;
}
// Group-level add form
window.showGroupForm=function(grp,type){
  const key=grp.replace(/[^a-z0-9]/gi,'_');
  const el=document.getElementById('gf-'+key);
  if(el)el.style.display='block';
};
window.hideGroupForm=function(grp){
  const key=grp.replace(/[^a-z0-9]/gi,'_');
  const el=document.getElementById('gf-'+key);
  if(el)el.style.display='none';
};
window.saveGroupForm=async function(grp,type){
  const key=grp.replace(/[^a-z0-9]/gi,'_');
  const nameEl=document.getElementById('gf-name-'+key);
  if(!nameEl)return;
  const name=nameEl.value.trim();
  if(!name)return alert('Digite o nome da categoria');
  const maxOrder=STATE.data.categories.filter(c=>c.type===type&&(c.group===grp||c.sector===grp)).reduce((m,c)=>Math.max(m,c.order||0),0);
  const d=type==='revenue'?{name,sector:grp,group:grp,type,order:maxOrder+1}:{name,group:grp,type,order:maxOrder+1};
  await saveCategory(d);
  document.getElementById('gf-'+key).style.display='none';
  nameEl.value='';
  reload();
};

window.showInlineForm=t=>document.getElementById(`inline-form-${t}`).style.display='block';
window.hideInlineForm=t=>document.getElementById(`inline-form-${t}`).style.display='none';
window.saveInlineForm=async function(type){
  const name=document.getElementById(`if-name-${type}`).value.trim();
  const group=document.getElementById(`if-group-${type}`).value;
  const order=+document.getElementById(`if-order-${type}`).value||50;
  if(!name)return alert('Digite o nome');
  await saveCategory(type==='revenue'?{name,sector:group,group,type,order}:{name,group,type,order});
  document.getElementById(`inline-form-${type}`).style.display='none';

};
window.startEditCat=id=>{STATE.editingCat=id;render();};

window.saveCatEdit=async function(id){

  const cat=STATE.data.categories.find(c=>c.id===id);
  if(cat){await saveCategory({...cat,name:el.value.trim()||cat.name});}

};

      <div><label style="font-size:10px;color:#888;display:block;margin-bottom:3px">Valor bruto (R$)</label><input id="wf-gross-${inv.id}" type="number" class="input" placeholder="0" style="width:130px" oninput="calcNet('${inv.id}')"></div>
      <div><label style="font-size:10px;color:#888;display:block;margin-bottom:3px">IR / IOF (R$)</label><input id="wf-tax-${inv.id}" type="number" class="input" placeholder="0" style="width:110px" oninput="calcNet('${inv.id}')"></div>
      <div><label style="font-size:10px;color:#888;display:block;margin-bottom:3px">Valor líquido (R$)</label><input id="wf-net-${inv.id}" type="number" class="input" placeholder="0" style="width:130px;background:#f1f8e9;font-weight:600"></div>
      <div><label style="font-size:10px;color:#888;display:block;margin-bottom:3px">Motivo</label><input id="wf-notes-${inv.id}" class="input" placeholder="Opcional" style="width:150px"></div>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px"><button class="btn" style="background:#e65100;color:white" onclick="saveWithdraw('${inv.id}')">Salvar resgate</button><button class="btn" onclick="document.getElementById('wf-${inv.id}').style.display='none'">Cancelar</button></div></div>`;
    // histórico
    if(inv.withdrawals?.length>0){
      html+=`<div style="margin-bottom:8px;border:1px solid #ffe0b2;border-radius:6px;padding:8px"><div style="font-size:11px;font-weight:600;color:#e65100;margin-bottom:4px">Histórico de resgates</div>`;
      inv.withdrawals.forEach(w=>{
        html+=`<div style="display:flex;flex-wrap:wrap;gap:12px;padding:3px 0;border-bottom:1px solid #fff3e0;font-size:11px"><span>${w.date||'-'}</span><span class="mono" style="color:#555">Bruto: ${fmt(w.amount||0)}</span><span class="mono" style="color:#c62828">IR/IOF: ${fmt(w.tax||0)}</span><span class="mono" style="color:#2e7d32;font-weight:600">Líq: ${fmt(w.netValue||w.amount||0)}</span>${w.notes?`<span style="color:#999">${w.notes}</span>`:''}</div>`;
      });
      html+=`</div>`;
    }
    html+=`<div class="table-scroll"><table><thead><tr><th></th>${MONTHS.map(m=>`<th class="r" style="min-width:85px">${m}</th>`).join('')}</tr></thead><tbody>`;
    html+=`<tr><td style="font-size:12px;font-weight:500">Saldo</td>${vals.map((v,mi)=>`<td><input type="number" class="input-num" value="${v||''}" placeholder="0" data-inv="${inv.id}" data-month="${mi}"></td>`).join('')}</tr>`;
    html+=`<tr><td style="font-size:11px;color:#999">Rend.</td>${rendMensal.map(v=>`<td class="r mono" style="font-size:11px;color:${v>0?'#2e7d32':v<0?'#c62828':'#ccc'}">${v!==0?fmt(v):'-'}</td>`).join('')}</tr>`;
    html+=`</tbody></table></div></div>`;
  });
  return html;
}
window.calcNet=id=>{const g=+document.getElementById(`wf-gross-${id}`)?.value||0;const t=+document.getElementById(`wf-tax-${id}`)?.value||0;const el=document.getElementById(`wf-net-${id}`);if(el)el.value=Math.max(0,g-t)||'';};
window.showWithdrawForm=id=>document.getElementById(`wf-${id}`).style.display='block';
window.showInvForm=()=>document.getElementById('inv-form').style.display='block';
window.saveInvForm=async function(){
  const name=document.getElementById('if-name')?.value?.trim();if(!name)return alert('Digite o nome');
  await saveInvestment({name,institution:document.getElementById('if-inst').value,startDate:document.getElementById('if-date').value,startValue:+document.getElementById('if-value').value||0,withdrawals:[],order:(STATE.data.investments.length||0)+1});
  document.getElementById('inv-form').style.display='none';reload();
};
window.deleteInvConfirm=async id=>{if(confirm('Excluir este investimento?')){await deleteInvestment(id);reload();}};
window.saveWithdraw=async function(invId){
  const inv=STATE.data.investments.find(x=>x.id===invId);if(!inv)return;
  const amount=+document.getElementById(`wf-gross-${invId}`)?.value||0;if(!amount)return alert('Digite o valor bruto');
  const tax=+document.getElementById(`wf-tax-${invId}`)?.value||0;
  const netValue=+document.getElementById(`wf-net-${invId}`)?.value||amount-tax;
  const withdrawals=[...(inv.withdrawals||[]),{date:document.getElementById(`wf-date-${invId}`)?.value||'',amount,tax,netValue,notes:document.getElementById(`wf-notes-${invId}`)?.value||''}];
  await saveInvestment({...inv,withdrawals});document.getElementById(`wf-${invId}`).style.display='none';reload();
};

// RELATÓRIOS
function renderReports(){
  let html=`<h1 class="page-title">Relatórios</h1><p class="page-sub">Exporte PDFs do DRE</p>`;
  html+=`<div class="card" style="margin-bottom:12px"><h3 class="card-title">Por mês</h3><div style="display:flex;flex-wrap:wrap;gap:6px">`;
  MONTHS.forEach((m,i)=>html+=`<button class="btn" onclick="exportMonthPDF(${i})">📄 ${m}</button>`);
  html+=`</div></div><div class="card"><h3 class="card-title">Período selecionado</h3><p class="sub" style="margin-bottom:10px">Use o seletor no topo para definir o período</p><button class="btn green" onclick="exportPDF('${getPeriodLabel()}',STATE.calc)">📄 Exportar ${getPeriodLabel()}</button></div>`;
  return html;
}
window.exportMonthPDF=async function(month){const data=STATE.data||await loadAll(STATE.year);exportPDF(`${MONTHS[month]}_${STATE.year}`,calcRange(data,[month]));};
window.exportPDF=exportPDF;window.STATE=STATE;

// EVENTS
// Debounce helper
const _timers={};
function debounce(key,fn,ms=800){clearTimeout(_timers[key]);_timers[key]=setTimeout(fn,ms);}

function showSaved(el){el.style.background='#e8f5e9';el.style.borderColor='#66bb6a';setTimeout(()=>{el.style.background='';el.style.borderColor='';},1200);}

function attachEvents(){
  document.querySelectorAll('input[data-cat]').forEach(el=>{
    el.oninput=function(){
      const self=this;
      debounce('cat_'+self.dataset.cat+'_'+self.dataset.month,async()=>{
        await saveEntry(self.dataset.cat,STATE.year,+self.dataset.month,self.value,self.dataset.type);
        showSaved(self);
      });
    };
  });
  document.querySelectorAll('input[data-acc]').forEach(el=>{
    el.oninput=function(){
      const self=this;
      debounce('acc_'+self.dataset.acc+'_'+self.dataset.month,async()=>{
        await saveMonthlyBalance(self.dataset.acc,STATE.year,+self.dataset.month,self.value);
        showSaved(self);
      });
    };
  });
  document.querySelectorAll('input[data-inv]').forEach(el=>{
    el.oninput=function(){
      const self=this;
      debounce('inv_'+self.dataset.inv+'_'+self.dataset.month,async()=>{
        await saveInvBalance(self.dataset.inv,STATE.year,+self.dataset.month,self.value);
        showSaved(self);
      });
    };
  });
  document.querySelectorAll('input[data-cofre]').forEach(el=>{
    el.oninput=function(){
      const self=this;
      debounce('cofre_'+self.dataset.month,async()=>{
        const year=+self.dataset.cofre;const month=+self.dataset.month;
        await set(ref(db,`cofre/${year}_${month}`),Number(self.value)||0);
        showSaved(self);
      });
    };
  });
}

// INIT
(async()=>{
  document.getElementById('loading').style.display='flex';
  await autoSeed();
  STATE.data=await loadAll(STATE.year);
  STATE.calc=calcRange(STATE.data,STATE.selectedMonths);
  render();
  document.getElementById('loading').style.display='none';
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f8faf8;color:#1a2e1a;display:flex;min-height:100vh;flex-direction:column}
.sidebar{width:200px;background:#fff;border-right:1px solid #e4eae4;display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:50}
.sidebar .logo{font-size:18px;font-weight:700;color:#1b5e20;padding:0 10px 14px;letter-spacing:-0.5px}
.sidebar .logo span{display:block;font-size:10px;color:#999;font-weight:400}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border:0;background:0;font-size:13px;font-family:inherit;color:#666;cursor:pointer;border-radius:8px;width:100%;text-align:left;transition:all .15s}
.nav-btn:hover{background:#e8f5e9;color:#1b5e20}
.nav-btn.active{background:#e8f5e9;color:#1b5e20;font-weight:600}
.main-wrap{margin-left:200px;flex:1;display:flex;flex-direction:column}

.main{flex:1;padding:24px;overflow:auto}
.page-title{font-size:22px;font-weight:700;color:#1a2e1a;letter-spacing:-0.3px}
.page-sub{font-size:13px;color:#888;margin:2px 0 16px}
.card{background:#fff;border:1px solid #e4eae4;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{font-size:14px;font-weight:600;color:#555;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px}
.kpi-card{background:#fff;border:1px solid #e4eae4;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#999}
.kpi-value{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:4px}
.sector-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.sub{font-size:11px;color:#999}
.btn{padding:7px 14px;border:1px solid #ddd;border-radius:8px;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;background:#f5f5f5;color:#333;transition:all .15s}
.btn:hover{background:#eee}.btn.green{background:#1b5e20;color:#fff;border-color:#1b5e20}.btn.green:hover{background:#2e7d32}
.btn-sm{padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:11px;cursor:pointer;background:#fafafa;color:#555;font-family:inherit;transition:all .15s}
.btn-sm:hover{background:#eee}.btn-sm.green{background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7}
.btn-sm.red{color:#c62828;border-color:#ffcdd2;background:#fff5f5}.btn-sm.red:hover{background:#ffebee}
.input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;background:#fafafa;outline:0;transition:border .15s}
.input:focus{border-color:#66bb6a}
.input-num{width:100%;padding:5px 6px;border:1px solid #e4eae4;border-radius:5px;font-size:12px;font-family:'JetBrains Mono',monospace;text-align:right;background:#fafafa;outline:0;transition:border .15s}
.input-num:focus{border-color:#66bb6a;background:#f1f8e9}
.form-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:#999;background:#fafafa;border-bottom:1px solid #e4eae4}
td{padding:6px 8px;border-bottom:1px solid #f0f4f0}
.r{text-align:right}.mono{font-family:'JetBrains Mono',monospace}.bold{font-weight:600}.red{color:#c62828}
.total-row{background:#f1f8e9}
.dre-table th,.dre-table td{padding:8px 12px}
.dre-row.clickable{cursor:pointer}.dre-row.clickable:hover{background:#f8faf8}
.sep{height:2px;padding:0;background:#e4eae4;border:0}
.period-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.period-tabs{display:flex;gap:2px;background:#f0f4f0;border-radius:8px;padding:3px}
.ptab{padding:5px 12px;border:0;background:transparent;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;color:#666;transition:all .15s}
.ptab.active{background:#fff;color:#1b5e20;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.month-pills{display:flex;gap:4px;flex-wrap:wrap}
.mpill{padding:4px 10px;border:1px solid #ddd;border-radius:20px;font-size:11px;cursor:pointer;background:#fafafa;color:#666;font-family:inherit;transition:all .15s}
.mpill.active{background:#1b5e20;color:#fff;border-color:#1b5e20}
.range-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#loading{position:fixed;inset:0;background:rgba(248,250,248,.92);display:flex;align-items:center;justify-content:center;z-index:999}
.spinner{width:32px;height:32px;border:3px solid #c8e6c9;border-top-color:#1b5e20;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.sidebar{width:100%;height:auto;flex-direction:row;overflow-x:auto;padding:8px;position:relative}.main-wrap{margin-left:0}.nav-btn{white-space:nowrap;padding:8px 12px}.kpi-grid{grid-template-columns:repeat(2,1fr)}.sector-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>

<div id="setup-screen" style="display:none;position:fixed;inset:0;background:#f8faf8;z-index:200;align-items:center;justify-content:center">
  <div style="background:#fff;border:1px solid #e4eae4;border-radius:16px;padding:36px;max-width:440px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.08)">
    <div style="text-align:center;margin-bottom:24px"><div style="font-size:36px;margin-bottom:8px">🔥</div>
    <h2 style="font-size:20px;font-weight:700;color:#1a2e1a;margin-bottom:6px">Conectar ao Firebase</h2>
    <p style="font-size:13px;color:#888">Cole as informações do seu Realtime Database</p></div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#999;display:block;margin-bottom:5px">URL do Realtime Database</label>
      <input id="setup-dburl" class="input" style="width:100%;font-size:13px;padding:10px 12px" placeholder="https://financeiro-intervet-default-rtdb.firebaseio.com">
      <p style="font-size:11px;color:#aaa;margin-top:4px">Firebase Console → Realtime Database → URL no topo</p>
    </div>
    <div style="margin-bottom:22px">
      <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#999;display:block;margin-bottom:5px">API Key</label>
      <input id="setup-apikey" class="input" style="width:100%;padding:10px 12px" placeholder="AIzaSy...">
      <p style="font-size:11px;color:#aaa;margin-top:4px">Firebase Console → ⚙️ Configurações → Seus apps → Config</p>
    </div>
    <button onclick="conectarFirebase()" style="width:100%;padding:12px;background:#1b5e20;color:#fff;border:0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">🔗 Conectar e Salvar</button>
  </div>
</div>

<nav class="sidebar">
  <div class="logo">Intervet<span>Centro Veterinário • Financeiro</span></div>
  <button class="nav-btn active" data-tab="dashboard" onclick="setTab('dashboard')">📊 Dashboard</button>
  <button class="nav-btn" data-tab="dre" onclick="setTab('dre')">📋 DRE</button>
  <button class="nav-btn" data-tab="revenue" onclick="setTab('revenue')">💰 Receitas</button>
  <button class="nav-btn" data-tab="expenses" onclick="setTab('expenses')">💸 Despesas</button>
  <button class="nav-btn" data-tab="accounts" onclick="setTab('accounts')">🏦 Contas</button>

      <span style="font-size:11px;color:#999">Ano:</span>
      <select id="year-select" class="input" style="font-size:12px;font-weight:600;padding:4px 6px" onchange="setYear(this.value)">
        <option>2023</option><option>2024</option><option>2025</option><option>2026</option><option>2027</option>

  <div class="top-bar"><div id="period-bar-container"></div></div>
